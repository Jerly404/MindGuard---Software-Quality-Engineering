# SonarCloud Configuration
sonar.organization=jerly404
sonar.projectKey=Jerly404_MindGuard---Software-Quality-Engineering
sonar.projectName=MindGuard---Software-Quality-Engineering

# Path to sources and tests
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests
sonar.test.inclusions=backend/tests/**

# Exclude vendor, build artifacts, and test files from source analysis
sonar.exclusions=**/node_modules/**,**/venv/**,**/dist/**,**/build/**,**/migrations/**,**/*.db,**/playwright-report/**,**/test-results/**,**/*.test.tsx,**/*.test.ts,**/*.spec.tsx,**/*.spec.ts

# Language specific settings
sonar.python.version=3.11
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
