[pytest]
# Configuración de pytest para MindGuard Backend

# Versión mínima
minversion = 7.0

# Modo asyncio automático
asyncio_mode = auto

# Rutas de tests
testpaths = 
    tests

# Pythonpath para importaciones
pythonpath = 
    .

# Opciones adicionales
addopts = 
    -ra
    -q
    --strict-markers
    --tb=short
    --disable-warnings

# Marcadores personalizados
markers =
    asyncio: marca test como asincrónico (async)
    unit: prueba unitaria
    functional: prueba funcional
    integration: prueba de integración
    admin: requiere credenciales de admin
    slow: test que toma tiempo en ejecutar
    skip_in_ci: saltar en ambiente CI

# Timeout para tests (segundos)
timeout = 300

# Mostrar variables locales en caso de error
showlocals = true

# Capturar output
console_output_style = progress

# Mínima cobertura requerida (opcional)
# addopts = --cov=app --cov-fail-under=70
