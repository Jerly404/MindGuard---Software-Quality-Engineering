name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.2
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@0230db06d91d12976a9c1186e2462e912440b8a4 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN || secrets.SONAR }}
          SONAR_HOST_URL: https://sonarcloud.io
